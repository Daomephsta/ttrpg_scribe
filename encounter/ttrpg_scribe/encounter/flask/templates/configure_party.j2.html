<!DOCTYPE html>
<html>
    <head>
        <title>Configure Party</title>
        <style>
        #centered {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #party {
            display: flex;
            flex-direction: column;
            width: 33%;
            margin-left: auto;
            margin-right: auto;
        }
        .character {
            display: inline-block;
            width: 5em;
        }
        </style>
        <script type="module" src="{{ url_for('.static', filename='configure_party.js') }}"></script>
    </head>
    <div id="centered">
        <h1>Configure Party</h1>
        <form action="/encounter/party/set" method="post" id="party">
        {% for name in config.PARTY | sort %}
            <label>
                <span class="character">{{ name }}</span><input type="checkbox" name="{{ name }}" checked>
            </label>
        {% endfor %}
            <div>
                <input type="text" class="character" id="add-character-name">
                <input type="button" value="+" id="add-character">
            </div>
            <input type="submit" value="Set Party" style="margin-top: 5px;">
        </form>
    </div>
</html>
