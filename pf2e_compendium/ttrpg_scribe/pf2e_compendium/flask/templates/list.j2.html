<!DOCTYPE html>
<html>
    <head>
        {% block meta %}
            {% if title %}
                <title>{{ title }}</title>
            {% endif %}
        {% endblock %}
    </head>
    {% block heading %}
    <span>
    {% if title or heading %}
        <h1>{{ heading | default(title) }}</h1>
    {% endif %}
    </span>
    {% endblock %}
    <a href="{{ url_for('.search_ui', doc_type=type) }}">Search</a>
    <hr>
    {% block content %}
    {% endblock %}
</html>
