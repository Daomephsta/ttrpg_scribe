{% extends 'list.j2.html' %}
{% set title = '%s Packs' % type.title() %}
{% block content %}
<ul>
{% for pack in packs | sort %}
    <li><a href="/compendium/list/{{ type }}/{{ pack }}">{{ pack }}</a></li>
{% endfor %}
</ul>
<hr>
<a href="{{ url_for('.search_ui', doc_type=type) }}">Search</a>
{% endblock %}
